name: "Multi Server Monitor 多服务器探针"
description: "同屏显示多台服务器状态，风格参考 xcgtb/Egern-Widgets 的 Server Monitor 探针。"
author: "Codex for dashitongzhi"
homepage: "https://github.com/dashitongzhi/egern-dual-server-widget"
manual: "https://github.com/dashitongzhi/egern-dual-server-widget#readme"
icon: server.rack

env_schema:
  SERVER_COUNT:
    name: "启用服务器数量"
    description: "从 1 号槽位开始读取，最多支持 8 台；未填写 Host 的槽位会自动跳过。"
    options: ["1", "2", "3", "4", "5", "6", "7", "8"]
    default_value: "2"

  SERVER_1_NAME:
    name: "[服务器1] 显示名称"
    description: "显示在小组件上的服务器名称。"
    default_value: "Node 1"
  SERVER_1_HOST:
    name: "[服务器1] 主机地址"
    description: "SSH 服务器 IP 或域名，必填。"
    default_value: ""
  SERVER_1_PORT:
    name: "[服务器1] SSH 端口"
    default_value: "22"
  SERVER_1_USER:
    name: "[服务器1] 用户名"
    default_value: "root"
  SERVER_1_PASSWORD:
    name: "[服务器1] 密码"
    description: "与私钥二选一。"
    default_value: ""
  SERVER_1_KEY:
    name: "[服务器1] 私钥"
    description: "与密码二选一，支持直接粘贴私钥。"
    default_value: ""

  SERVER_2_NAME:
    name: "[服务器2] 显示名称"
    description: "显示在小组件上的服务器名称。"
